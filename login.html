<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Military Vehicle Parking System</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        background: url('hunter-afv.avif') center/cover no-repeat;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-container {
        width: 420px;
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
        text-align: center;
        border-top: 8px solid #556B2F;
        border-left: 1px solid rgba(255, 255, 255, 0.2);
    }

    .logo {
        width: 80px;
        height: 80px;
        margin: auto;
        border-radius: 50%;
        background: #556B2F;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 20px;
        overflow: hidden; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .logo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
    }

    h1 {
        color: #1e2b10;
        margin-bottom: 8px;
        font-size: 28px;
        text-shadow: 0 1px 2px rgba(255,255,255,0.4);
    }

    .subtitle {
        color: #222;
        margin-bottom: 30px;
        font-size: 14px;
        font-weight: 500;
    }

    .input-group {
        margin-bottom: 20px;
        text-align: left;
    }

    label {
        display: block;
        margin-bottom: 8px;
        color: #1e2b10;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 14px;
        border: 1px solid rgba(0, 0, 0, 0.15);
        border-radius: 8px;
        font-size: 15px;
        background: rgba(255, 255, 255, 0.6); 
        color: #000;
    }

    input:focus {
        outline: none;
        border-color: #556B2F;
        background: rgba(255, 255, 255, 0.9);
    }

    .login-btn {
        width: 100%;
        padding: 14px;
        background: #556B2F;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        font-weight: bold;
        box-shadow: 0 4px 12px rgba(85, 107, 47, 0.3);
    }

    .login-btn:hover {
        background: #3B4D2A;
    }

    #message {
        margin-top: 20px;
        color: #b30000;
        font-size: 14px;
        font-weight: bold;
    }

    .footer {
        margin-top: 30px;
        color: #1e2b10; 
        font-size: 12px;
        font-weight: bold;
        letter-spacing: 0.5px;
    }
</style>
</head>
<body>

<div class="login-container">
    <div class="logo">
        <img src="unit-logo.jpeg" alt="Unit Logo">
    </div>

    <h1>Vehicle Parking System</h1>
    <p class="subtitle">Military Vehicle Parking Management</p>

    <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your military email">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password">
    </div>

    <button class="login-btn" onclick="login()">
        LOGIN
    </button>

    <p id="message"></p>

    <div class="footer">
        AUTHORIZED PERSONNEL ONLY
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    console.log("✅ Diagnostic: Embedded script block successfully loaded inside HTML!");

    // ⚠️ REPLACE THESE WITH YOUR ACTUAL SUPABASE CREDENTIALS
    const supabaseUrl = 'https://your-project-id.supabase.co'; 
    const supabaseKey = 'your-anon-public-key';               

    let supabaseClient;
    try {
        supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        console.log("✅ Diagnostic: Supabase client initialized completely.");
    } catch (e) {
        console.error("❌ Diagnostic Error: Supabase engine initialization failure:", e);
    }

    async function login() {
        console.log("🔘 Button click recognized! executing logic...");
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const messageElement = document.getElementById('message');

        if (!email || !password) {
            messageElement.style.color = "red";
            messageElement.innerText = "Please fill in both fields.";
            return;
        }

        messageElement.style.color = "#3B4D2A";
        messageElement.innerText = "Authenticating...";

        if (supabaseUrl.includes("your-project-id")) {
            alert("Configuration Required: Replace the placeholder keys inside the script at the bottom of the HTML file with your real Supabase keys.");
            messageElement.style.color = "red";
            messageElement.innerText = "Configuration Error: Placeholder keys detected.";
            return;
        }

        try {
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                messageElement.style.color = "red";
                messageElement.innerText = error.message;
                console.log("❌ Authentication failed:", error.message);
            } else {
                messageElement.style.color = "green";
                messageElement.innerText = "Login successful! Redirecting...";
                console.log("✅ Authentication successful!");
                
                setTimeout(() => {
                    window.location.href = "parking-management.html"; 
                }, 1500);
            }
        } catch (err) {
            messageElement.style.color = "red";
            messageElement.innerText = "An unexpected error occurred.";
            console.error(err);
        }
    }
</script>

</body>
</html>
