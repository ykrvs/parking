<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Military Vehicle Parking System</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        background: url('hunter-afv.avif') center/cover no-repeat;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-container {
        width: 420px;
        /* Made more translucent and added a blur effect to see the background better */
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px); /* For Safari support */
        
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        text-align: center;
        border-top: 8px solid #556B2F;
    }

    .logo {
        width: 80px;
        height: 80px;
        margin: auto;
        border-radius: 50%;
        background: #556B2F;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 36px;
        margin-bottom: 20px;
        overflow: hidden; /* Prevents the image from bleeding out of the circle */
    }

    /* Added this rule to fix the giant logo image */
    .logo img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* Keeps aspect ratio while filling the circle */
    }

    h1 {
        color: #3B4D2A;
        margin-bottom: 8px;
        font-size: 28px;
    }

    .subtitle {
        color: #666;
        margin-bottom: 30px;
        font-size: 14px;
    }

    .input-group {
        margin-bottom: 20px;
        text-align: left;
    }

    label {
        display: block;
        margin-bottom: 8px;
        color: #3B4D2A;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 14px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
        background: rgba(255, 255, 255, 0.8); /* Slightly translucent inputs */
    }

    input:focus {
        outline: none;
        border-color: #556B2F;
        background: #fff;
    }

    .login-btn {
        width: 100%;
        padding: 14px;
        background: #556B2F;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        font-weight: bold;
    }

    .login-btn:hover {
        background: #3B4D2A;
    }

    #message {
        margin-top: 20px;
        color: red;
        font-size: 14px;
    }

    .footer {
        margin-top: 30px;
        color: #3B4D2A; /* Darkened slightly for contrast against the translucent background */
        font-size: 12px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="login-container">

    <div class="logo">
        <img src="unit-logo.jpeg" alt="Unit Logo">
    </div>

    <h1>Vehicle Parking System</h1>

    <p class="subtitle">
        Military Vehicle Parking Management
    </p>

    <div class="input-group">
        <label>Email Address</label>
        <input
            type="email"
            id="email"
            placeholder="Enter your military email">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input
            type="password"
            id="password"
            placeholder="Enter your password">
    </div>

    <button class="login-btn" onclick="login()">
        LOGIN
    </button>

    <p id="message"></p>

    <div class="footer">
        Authorized Personnel Only
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="login.js"></script>

</body>
</html>
