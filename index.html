
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Parking Management</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
}

header{
    background:#1976d2;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    padding:20px;
}

button{
    background:#1976d2;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
    margin-right:5px;
    margin-bottom:10px;
}

button:hover{
    background:#145ca8;
}

input,
select{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

.vehicle-card,
.history-card{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    cursor:pointer;
}

.vehicle-card:hover{
    background:#eef5ff;
}

.level{
    margin-top:25px;
}

.search-card{
    background:#fff8e1;
    padding:10px;
    margin:10px 0;
    border-left:5px solid orange;
    border-radius:5px;
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
}

.modal-content{
    background:white;
    width:90%;
    max-width:500px;
    margin:50px auto;
    padding:20px;
    border-radius:10px;
}

#historyPage{
    display:none;
}

.badge-active{
    color:green;
    font-weight:bold;
}

.badge-history{
    color:red;
    font-weight:bold;
}

</style>
</head>

<body>

<header>
    <h2>Vehicle Parking Management System</h2>
</header>

<div class="container">

    <!-- HOME PAGE -->
    <div id="homePage">

        <input
            type="text"
            id="searchInput"
            placeholder="Search by plate, driver, type, lot..."
            onkeyup="searchVehicles()"
        >

        <button onclick="showAddForm()">
            + Add Vehicle
        </button>

        <button onclick="showHistoryPage()">
            History
        </button>

        <div id="searchResults"></div>

        <div id="parkingArea"></div>

    </div>

    <!-- HISTORY PAGE -->
    <div id="historyPage">

        <h2>Vehicle History</h2>

        <br>

        <button onclick="showHomePage()">
            ← Back Home
        </button>

        <input
            type="text"
            id="historySearch"
            placeholder="Search History..."
            onkeyup="renderHistory()"
        >

        <div id="historyContainer"></div>

    </div>

</div>

<!-- ADD VEHICLE MODAL -->
<div class="modal" id="addModal">

    <div class="modal-content">

        <h3>Add Vehicle</h3>

        <br>

        <input id="driver" placeholder="Driver Name">

        <input id="type" placeholder="Vehicle Type">

        <input id="variant" placeholder="Variant">

        <input id="plate" placeholder="License Plate">

        <select id="level">
            <option>Level 1</option>
            <option>Level 2</option>
            <option>Level 3</option>
        </select>

        <input id="lot" placeholder="Parking Lot">

        <button onclick="addVehicle()">
            Save Vehicle
        </button>

        <button onclick="closeModal()">
            Cancel
        </button>

    </div>

</div>

<!-- DETAILS MODAL -->
<div class="modal" id="detailsModal">

    <div class="modal-content" id="detailsContent"></div>

</div>

<script>

let vehicles =
JSON.parse(localStorage.getItem("vehicles")) || [];

let history =
JSON.parse(localStorage.getItem("history")) || [];

function saveData(){

    localStorage.setItem(
        "vehicles",
        JSON.stringify(vehicles)
    );

    localStorage.setItem(
        "history",
        JSON.stringify(history)
    );
}

function showAddForm(){
    document.getElementById("addModal").style.display="block";
}

function closeModal(){
    document.getElementById("addModal").style.display="none";
    document.getElementById("detailsModal").style.display="none";
}

function addVehicle(){

    const vehicle = {

        id:Date.now(),

        driver:
        document.getElementById("driver").value,

        type:
        document.getElementById("type").value,

        variant:
        document.getElementById("variant").value,

        plate:
        document.getElementById("plate").value,

        level:
        document.getElementById("level").value,

        lot:
        document.getElementById("lot").value,

        checkInTime:
        new Date().toLocaleString()
    };

    vehicles.push(vehicle);

    saveData();

    renderVehicles();

    closeModal();
}

function renderVehicles(){

    let html="";

    ["Level 1","Level 2","Level 3"].forEach(level=>{

        html += `<div class="level">
        <h2>${level}</h2>`;

        const levelVehicles =
        vehicles.filter(v=>v.level===level);

        if(levelVehicles.length===0){

            html += "<p>No vehicles parked.</p>";
        }

        levelVehicles.forEach(v=>{

            html += `
            <div
                class="vehicle-card"
                onclick="showDetails(${v.id})">

                <strong>${v.plate}</strong><br>

                Driver: ${v.driver}<br>

                Lot: ${v.lot}

            </div>
            `;
        });

        html += "</div>";
    });

    document.getElementById(
        "parkingArea"
    ).innerHTML = html;
}

function showDetails(id){

    const v =
    vehicles.find(x=>x.id===id);

    document.getElementById(
        "detailsContent"
    ).innerHTML = `

    <h3>Vehicle Details</h3>

    <br>

    <p><b>Driver:</b> ${v.driver}</p>
    <p><b>Vehicle Type:</b> ${v.type}</p>
    <p><b>Variant:</b> ${v.variant}</p>
    <p><b>Parking Level:</b> ${v.level}</p>
    <p><b>Parking Lot:</b> ${v.lot}</p>
    <p><b>License Plate:</b> ${v.plate}</p>
    <p><b>Check In:</b> ${v.checkInTime}</p>

    <br>

    <button onclick="moveOut(${v.id})">
        Move Out Vehicle
    </button>

    <button onclick="closeModal()">
        Close
    </button>
    `;

    document.getElementById(
        "detailsModal"
    ).style.display="block";
}

function moveOut(id){

    const index =
    vehicles.findIndex(v=>v.id===id);

    if(index > -1){

        const vehicle =
        vehicles.splice(index,1)[0];

        vehicle.checkOutTime =
        new Date().toLocaleString();

        history.push(vehicle);

        saveData();

        renderVehicles();

        closeModal();
    }
}

function searchVehicles(){

    const keyword =
    document.getElementById(
        "searchInput"
    ).value.toLowerCase();

    if(keyword===""){

        document.getElementById(
            "searchResults"
        ).innerHTML="";

        return;
    }

    let html="<h3>Search Results</h3>";

    const results = [];

    vehicles.forEach(v=>{

        const text =
        JSON.stringify(v).toLowerCase();

        if(text.includes(keyword)){

            results.push({
                ...v,
                status:"Active"
            });
        }
    });

    history.forEach(v=>{

        const text =
        JSON.stringify(v).toLowerCase();

        if(text.includes(keyword)){

            results.push({
                ...v,
                status:"History"
            });
        }
    });

    if(results.length===0){

        html += `
        <div class="search-card">
            No results found.
        </div>`;
    }

    results.forEach(v=>{

        html += `
        <div class="search-card">

            <strong>${v.plate}</strong><br>

            Driver: ${v.driver}<br>

            Lot: ${v.lot}<br>

            Status:
            <span class="${
                v.status==="Active"
                ? "badge-active"
                : "badge-history"
            }">
                ${v.status}
            </span>

        </div>`;
    });

    document.getElementById(
        "searchResults"
    ).innerHTML = html;
}

function showHistoryPage(){

    document.getElementById(
        "homePage"
    ).style.display="none";

    document.getElementById(
        "historyPage"
    ).style.display="block";

    renderHistory();
}

function showHomePage(){

    document.getElementById(
        "historyPage"
    ).style.display="none";

    document.getElementById(
        "homePage"
    ).style.display="block";
}

function renderHistory(){

    const keyword =
    document.getElementById(
        "historySearch"
    ).value.toLowerCase();

    let html="";

    const filtered =
    history.filter(v=>{

        return JSON.stringify(v)
        .toLowerCase()
        .includes(keyword);
    });

    if(filtered.length===0){

        html =
        "<p>No history records found.</p>";
    }

    filtered.forEach(v=>{

        html += `
        <div class="history-card">

            <h3>${v.plate}</h3>

            <p>
                <strong>Driver:</strong>
                ${v.driver}
            </p>

            <p>
                <strong>Vehicle Type:</strong>
                ${v.type}
            </p>

            <p>
                <strong>Variant:</strong>
                ${v.variant}
            </p>

            <p>
                <strong>Level:</strong>
                ${v.level}
            </p>

            <p>
                <strong>Lot:</strong>
                ${v.lot}
            </p>

            <p>
                <strong>Check In:</strong>
                ${v.checkInTime}
            </p>

            <p>
                <strong>Check Out:</strong>
                ${v.checkOutTime}
            </p>

        </div>`;
    });

    document.getElementById(
        "historyContainer"
    ).innerHTML = html;
}

renderVehicles();

</script>

</body>
</html>
